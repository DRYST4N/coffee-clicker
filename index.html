<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Clicker</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-4">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-lg-6">
                <section class="game-frame p-3 p-md-4">
                    <div id="hud" class="mb-3">
                        <div id="progresoNegocio" class="mb-3">
                            <div class="hud-line">Negocio: <span id="negocioTexto">Puesto callejero</span></div>
                            <div class="hud-line">Siguiente meta: <span id="metaTexto">Cafetería local</span></div>
                            <div class="hud-line">Faltan: <span id="faltanTexto">0</span> granos</div>
                        </div>
                        
                        <div class="hud-line">Dinero: <span id="dineroTexto">0.00</span> €</div>
                        <div class="hud-line">Valor: <span id="valorTexto">0.01</span> €</div>
                        <div class="hud-line">Granos: <span id="granosTexto">0.00</span></div>
                    </div>

                    <div id="panel" class="mx-auto">
                        <img src="img/granoCoffee.png" alt="Grano de Café pixel art" id="granoCafe">
                    </div>

                    <div class="mt-3 text-center small-pixel">
                        Haz click en el grano para producir café
                    </div>
                </section>
            </div>

            <div class="col-12 col-lg-6">
                <section class="shop-frame p-3 p-md-4">
                    <h2 class="shop-title mb-3">Tienda</h2>

                    <div class="shop-section mb-4">
                        <h3 class="section-title">Mejoras</h3>
                        <div id="upgradeContainer" class="d-grid gap-3"></div>
                    </div>

                    <div class="shop-section mb-4">
                        <h3 class="section-title">Automatizaciones</h3>
                        <div id="automationContainer" class="d-grid gap-3"></div>
                    </div>

                    <div class="shop-section">
                        <h3 class="section-title">Revivir</h3>
                        <div class="shop-card">
                            <div>
                                <div class="card-title-pixel">Revivir</div>
                                <div class="card-subtext">
                                    Reinicia el progreso pero duplicas el valor del café.
                                </div>
                            </div>
                            <button id="reboton" class="pixel-btn mt-3" disabled>
                                Precio: 1000 granos
                            </button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
    <button
    id="feedbackOpenBtn"
    class="pixel-btn mt-3"
    data-bs-toggle="modal"
    data-bs-target="#feedbackModal"
    type="button"
>
    Enviar feedback
    </button>
    <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content pixel-modal">
                <div class="modal-header pixel-modal-header">
                    <h5 class="modal-title shop-title mb-0" id="feedbackModalLabel">Feedback</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>

                <form
                    id="feedbackForm"
                    action="https://formsubmit.co/coffeeclicker.dev@gmail.com"
                    method="POST"
                >
                    <div class="modal-body">
                        <input type="hidden" name="_subject" value="[Coffee Clicker] Nuevo feedback">
                        <input type="hidden" name="_captcha" value="false">
                        <input type="hidden" name="_template" value="table">
                        <input type="hidden" name="_next" value="http://localhost:8000/">

                        <div class="mb-3">
                            <label for="feedbackUsuario" class="form-label">Usuario (opcional)</label>
                            <input
                                type="text"
                                class="form-control pixel-input"
                                id="feedbackUsuario"
                                name="usuario"
                                maxlength="40"
                                placeholder="Tu nick o nombre"
                            >
                        </div>

                        <div class="mb-3">
                            <label for="feedbackMensaje" class="form-label">Feedback</label>
                            <textarea
                                class="form-control pixel-input"
                                id="feedbackMensaje"
                                name="feedback"
                                rows="5"
                                maxlength="1200"
                                required
                                placeholder="¿Qué mejorarías? ¿Qué te ha gustado? ¿Qué no has entendido?"
                            ></textarea>
                        </div>

                        <input type="hidden" id="feedbackNegocio" name="negocio">
                        <input type="hidden" id="feedbackDinero" name="dinero">
                        <input type="hidden" id="feedbackGranos" name="granos">
                        <input type="hidden" id="feedbackValor" name="valor">
                        <input type="hidden" id="feedbackURL" name="pagina">
                        <input type="hidden" id="feedbackFecha" name="fecha">
                    </div>

                    <div class="modal-footer pixel-modal-footer">
                        <button type="button" class="pixel-btn" data-bs-dismiss="modal">Cerrar</button>
                        <button type="submit" class="pixel-btn">Enviar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="saveToast">Partida guardada</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
