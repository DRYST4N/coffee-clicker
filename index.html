<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Clicker</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-4">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-lg-6">
                <section class="game-frame p-3 p-md-4">
                    <div id="hud" class="mb-3">
                        <div class="hud-line">Dinero: <span id="dineroTexto">0.00</span> €</div>
                        <div class="hud-line">Valor: <span id="valorTexto">0.01</span> €</div>
                        <div class="hud-line">Granos: <span id="granosTexto">0.00</span></div>
                    </div>

                    <div id="panel" class="mx-auto">
                        <img src="img/granoCoffee.png" alt="Grano de Café pixel art" id="granoCafe">
                    </div>

                    <div class="mt-3 text-center small-pixel">
                        Haz click en el grano para producir café
                    </div>
                </section>
            </div>

            <div class="col-12 col-lg-6">
                <section class="shop-frame p-3 p-md-4">
                    <h2 class="shop-title mb-3">Tienda</h2>

                    <div class="shop-section mb-4">
                        <h3 class="section-title">Mejoras</h3>
                        <div id="upgradeContainer" class="d-grid gap-3"></div>
                    </div>

                    <div class="shop-section mb-4">
                        <h3 class="section-title">Automatizaciones</h3>
                        <div id="automationContainer" class="d-grid gap-3"></div>
                    </div>

                    <div class="shop-section">
                        <h3 class="section-title">Revivir</h3>
                        <div class="shop-card">
                            <div>
                                <div class="card-title-pixel">Revivir</div>
                                <div class="card-subtext">
                                    Reinicia el progreso pero duplicas el valor del café.
                                </div>
                            </div>
                            <button id="reboton" class="pixel-btn mt-3" disabled>
                                Precio: 1000 granos
                            </button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
    <div id="saveToast">Partida guardada</div>
    <script src="scripts.js"></script>
</body>
</html>
