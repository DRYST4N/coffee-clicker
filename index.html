<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Pruebas/style.css">
    <title>Coffee clicker</title>
</head>
<body>
    <div id="panel">
        <div id="contador">Dinero: 0 | Valor: 0.1 | Coffee: 0 </div>
        <img src="/Pruebas/img/granoCoffee.png" alt="Grano de Cafe en pixel art" id="granoCafe">
    </div>
    <div id="tienda">
        <div id="mejoraClick">
            Mejoras click:
            <button id="level" disabled>Nivel: 0 | Precio: 25€</button>
        </div>
        <div id="automatizacion-1">
            Automatizacion 1 (0.01)
            <button id="auto1" disabled>Nivel: 0 | Precio: 100€ </button>
        </div>

        <div id="revivir">
            Revivir
            <button id="reboton" disabled>Precio: 1000 granos</button>
        </div>
    </div>

    <script src="/Pruebas/scripts.js"></script>
</body>
</html>
